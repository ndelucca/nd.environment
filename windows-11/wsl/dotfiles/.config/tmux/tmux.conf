set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB"
set -s escape-time 0

# Clipboard en WSL: copia al portapapeles de Windows por dos vias complementarias.
#  - set-clipboard on: emite OSC-52 hacia Windows Terminal (sirve local Y por SSH/anidado).
#  - win32yank.exe (en los copy-pipe de copy-mode): cliente nativo de Windows invocado
#    desde WSL (mas robusto, sin limite de tamano). Lo instala 02-tools.sh en ~/.local/bin.
# Pegar = tecla del destino: Ctrl+Shift+V en la terminal, Ctrl+V en apps de Windows.
set -g set-clipboard on

set -g mouse on
setw -g mode-keys vi

set -g renumber-windows on
set -g history-limit 50000
set -g focus-events on

unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

unbind &
bind & kill-window

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recargado"

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "win32yank.exe -i --crlf"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "win32yank.exe -i --crlf"

set-window-option -g status-position top

set -g status-style "bg=#121212,fg=#e0e0e0"
set -g status-left-length 50
set -g status-right-length 100
set -g status-left ""
set -g status-right "#{?client_prefix,#[fg=#ffffff]PREFIX ,}"

set -g window-status-format "#[fg=#5c5c5c] #I #W "
set -g window-status-current-format "#[fg=#387838,bold] #I #W "
set -g window-status-separator "#[fg=#3a3a3a]│"

set -g pane-border-style "fg=#333333"
set -g pane-active-border-style "fg=#387838"

set -g message-style "bg=#1a1a1a,fg=#ffffff,bold"
set -g message-command-style "bg=#1a1a1a,fg=#ffffff"

set -g display-panes-active-colour "#387838"
set -g display-panes-colour "#666666"
